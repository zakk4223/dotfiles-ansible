- name: Install MangoWM 
  kewlfft.aur.aur:
    name: "mangowm-git"
    state: present
  become: yes
  become_user: aur_builder


- name: Install MangoWM files
  ansible.builtin.include_role: 
    name: "fileinstaller"

#- name: Create Terminal config snippet 
