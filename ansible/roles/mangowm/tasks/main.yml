#
- name: Wayland compositor setup
  ansible.builtin.include_role:
    name: "wayland_compositor"
  vars: 
    compositor_name: "mango"

- name: Create Launcher config snippet 
  ansible.builtin.lineinfile:
    path: "{{ [dotfile_config_base, 'mango', 'launcher.conf'] | path_join }}"
    line: "bind=SUPER,space,spawn,{{ preferred_launcher }}"
    create: true
  when: preferred_launcher is defined 

- name: Create Terminal config snippet 
  ansible.builtin.lineinfile:
    path: "{{ [dotfile_config_base, 'mango', 'terminal.conf'] | path_join }}"
    line: "bind=SUPER,Return,spawn,{{ preferred_terminal }}"
    create: true
  when: preferred_terminal is defined


